# Configuration Koyeb
# Ce fichier aide Koyeb à détecter automatiquement ton application

app:
  name: ryzom-backend
  regions:
    - fra # Frankfurt (Europe)
  
  services:
    - name: api
      type: web
      
      # Build configuration
      build:
        context: backend
        dockerfile: Dockerfile
      
      # Port configuration (Koyeb utilise automatiquement $PORT)
      ports:
        - port: 4000
          protocol: http
      
      # Health check pour vérifier que l'app fonctionne
      health_checks:
        - http:
            path: /health
            port: 4000
      
      # Instance type (Nano = gratuit)
      instance_type: nano
      
      # Auto-scaling (garde 1 instance toujours active)
      autoscaling:
        min: 1
        max: 1
      
      # Variables d'environnement (à configurer dans le dashboard Koyeb)
      # - MONGO_URI
      # - JWT_SECRET
      # - CLOUDINARY_CLOUD_NAME
      # - CLOUDINARY_API_KEY
      # - CLOUDINARY_API_SECRET
      # - FRONTEND_URL
      # - NODE_ENV=production
